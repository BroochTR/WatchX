<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-labelledby="watchxTitle watchxDesc">
  <title id="watchxTitle">WatchX</title>
  <desc id="watchxDesc">Simple WatchX logo with a hexagon, lens mark, and wordmark.</desc>
  <defs>
    <linearGradient id="watchxStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="55%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="watchxFill" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>

  <g transform="translate(160 58)">
    <path
      d="M0 -34 L29 -17 L29 17 L0 34 L-29 17 L-29 -17 Z"
      fill="url(#watchxFill)"
      stroke="url(#watchxStroke)"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <path
      d="M-24 0 C-16 -13 -8 -18 0 -18 C8 -18 16 -13 24 0 C16 13 8 18 0 18 C-8 18 -16 13 -24 0 Z"
      fill="none"
      stroke="url(#watchxStroke)"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle cx="0" cy="0" r="8" fill="#0f172a" stroke="url(#watchxStroke)" stroke-width="3"/>
    <path d="M-5 -5 L5 5 M5 -5 L-5 5" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <text
    x="160"
    y="125"
    text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="32"
    font-weight="700"
    letter-spacing="1.5"
    fill="#0f172a"
  >
    Watch<tspan fill="url(#watchxStroke)">X</tspan>
  </text>

  <text
    x="160"
    y="147"
    text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="11"
    letter-spacing="2.2"
    fill="#64748b"
  >
    SIMPLE NETWORK VIDEO RECORDER
  </text>
</svg>